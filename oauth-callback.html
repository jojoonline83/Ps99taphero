<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS99 OAuth Callback</title>
    <style>
        body { background: #0f0f23; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px; box-sizing: border-box; }
        .card { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 32px; max-width: 560px; width: 100%; }
        h2 { margin: 0 0 16px; color: #818cf8; }
        .code-box { background: #0f0f23; border: 1px solid #4338ca; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 13px; word-break: break-all; margin: 8px 0; user-select: all; cursor: pointer; white-space: pre-wrap; }
        .label { font-size: 13px; color: #94a3b8; margin: 12px 0 4px; }
        .error { color: #f87171; }
        .success { color: #34d399; }
        input { background: #0f0f23; border: 1px solid #2d2d44; color: #e2e8f0; padding: 10px 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: monospace; font-size: 14px; }
        button { background: #4338ca; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 8px; }
        button:hover { background: #3730a3; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .warn { background: #2d1b00; border: 1px solid #b45309; color: #fbbf24; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin: 12px 0; }
        .info { font-size: 13px; color: #94a3b8; line-height: 1.5; }
        .result { background: #0a2e1a; border: 1px solid #16a34a; border-radius: 8px; padding: 16px; margin: 12px 0; }
        .result h3 { color: #34d399; margin: 0 0 8px; }
        #status { margin-top: 12px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card" id="content"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const el = document.getElementById('content');

        if (error) {
            el.innerHTML = `<h2 class="error">Authorization Failed</h2><p>${error}</p>`;
        } else if (code) {
            el.innerHTML = `
                <h2 class="success">Authorization Successful</h2>
                <p class="info">Now exchange the code for a token. Enter your app credentials and the code verifier from the setup page.</p>
                <div class="label">Authorization Code (auto-filled)</div>
                <input type="text" id="auth-code" value="${code}" readonly>
                <div class="label">Client ID</div>
                <input type="text" id="client-id" placeholder="Your app's client_id">
                <div class="label">Client Secret</div>
                <input type="password" id="client-secret" placeholder="Your app's client_secret">
                <div class="label">Code Verifier (from the setup page)</div>
                <input type="text" id="code-verifier" placeholder="Paste the code verifier from Step 2">
                <br>
                <button id="exchange-btn" onclick="exchangeToken()">Exchange for Token</button>
                <div id="status"></div>
                <div id="result"></div>
                <div class="warn">Your credentials stay in your browser — nothing is sent to GitHub or any server except the Big Games token endpoint.</div>`;
        } else {
            el.innerHTML = `<h2>PS99 OAuth Setup</h2><p>This page handles the OAuth callback. Start from the <a href="oauth-setup.html" style="color:#818cf8">setup page</a>.</p>`;
        }

        async function exchangeToken() {
            const btn = document.getElementById('exchange-btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const clientId = document.getElementById('client-id').value.trim();
            const clientSecret = document.getElementById('client-secret').value.trim();
            const codeVerifier = document.getElementById('code-verifier').value.trim();
            const authCode = document.getElementById('auth-code').value.trim();

            if (!clientId || !clientSecret || !codeVerifier) {
                status.innerHTML = '<span class="error">Fill in all fields first.</span>';
                return;
            }

            btn.disabled = true;
            status.innerHTML = '<span style="color:#818cf8">Exchanging token...</span>';
            result.innerHTML = '';

            const redirectUri = 'https://jojoonline83.github.io/Ps99taphero/oauth-callback.html';

            try {
                const basicAuth = btoa(clientId + ':' + clientSecret);
                const body = new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: authCode,
                    redirect_uri: redirectUri,
                    code_verifier: codeVerifier,
                });

                const res = await fetch('https://db.biggames.io/oauth/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + basicAuth,
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: body.toString(),
                });

                const data = await res.json();

                if (data.access_token) {
                    status.innerHTML = '<span class="success">Token obtained!</span>';
                    result.innerHTML = `
                        <div class="result">
                            <h3>Token Ready</h3>
                            <p class="info">Copy the token below and add it as a GitHub Actions secret.</p>
                            <div class="label">Secret name:</div>
                            <div class="code-box" style="font-weight:bold">PS99_TOKEN_AVOCARDORABLE99 <span style="color:#94a3b8;font-weight:normal">(or PS99_TOKEN_JJLOVEGAME99)</span></div>
                            <div class="label">Token value (click to copy):</div>
                            <div class="code-box" id="token-value">${data.access_token}</div>
                            <button onclick="navigator.clipboard.writeText(document.getElementById('token-value').textContent).then(()=>this.textContent='Copied!')">Copy Token</button>
                            <p class="info" style="margin-top:12px">
                                Go to your repo: <strong>Settings &gt; Secrets and variables &gt; Actions &gt; New repository secret</strong><br>
                                Token type: ${data.token_type || 'bearer'} | Expires in: ${data.expires_in ? Math.round(data.expires_in / 86400) + ' days' : 'unknown'} | Scope: ${data.scope || 'unknown'}
                            </p>
                        </div>`;
                } else {
                    status.innerHTML = `<span class="error">Exchange failed: ${data.error_description || data.error || 'Unknown error'}</span>`;
                    btn.disabled = false;
                }
            } catch (err) {
                if (err.message && err.message.includes('Failed to fetch')) {
                    status.innerHTML = `<span class="error">CORS blocked — the Big Games API doesn't allow browser requests. Use the GitHub Actions workflow instead.</span>`;
                } else {
                    status.innerHTML = `<span class="error">Error: ${err.message}</span>`;
                }
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
