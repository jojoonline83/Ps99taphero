<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS99 OAuth Callback</title>
    <style>
        body { background: #0f0f23; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 32px; max-width: 520px; width: 90%; }
        h2 { margin: 0 0 16px; color: #818cf8; }
        .code-box { background: #0f0f23; border: 1px solid #4338ca; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 12px 0; user-select: all; cursor: pointer; }
        .step { margin: 12px 0; padding: 8px 12px; background: #1e1e3a; border-radius: 6px; font-size: 14px; line-height: 1.5; }
        .label { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .error { color: #f87171; }
        .success { color: #34d399; }
        button { background: #4338ca; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 8px; }
        button:hover { background: #3730a3; }
    </style>
</head>
<body>
    <div class="card" id="content"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const el = document.getElementById('content');

        if (error) {
            el.innerHTML = `<h2 class="error">Authorization Failed</h2><p>${error}</p>`;
        } else if (code) {
            el.innerHTML = `
                <h2 class="success">Authorization Successful</h2>
                <div class="label">Your authorization code:</div>
                <div class="code-box" id="code-box" title="Click to copy">${code}</div>
                <button onclick="navigator.clipboard.writeText('${code}').then(()=>this.textContent='Copied!')">Copy Code</button>
                <div class="step">
                    <strong>Next steps:</strong><br>
                    1. Copy this code above<br>
                    2. Go to your repo's GitHub Actions<br>
                    3. Run the "Exchange OAuth Token" workflow<br>
                    4. Paste this code when prompted<br>
                    <br>
                    <em>This code expires in 5 minutes.</em>
                </div>`;
        } else {
            el.innerHTML = `<h2>PS99 OAuth Setup</h2><p>This page handles the OAuth callback. Start the authorization flow from your developer app settings.</p>`;
        }
    </script>
</body>
</html>
