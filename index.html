<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>PS99 Tap Hero Tracker</title>
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo">
            <span class="logo-icon">🎯</span>
            <h1>PS99 Tap Hero — Leaderboard</h1>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <span id="event-status-badge"></span>
            <button class="btn-refresh" id="refresh-btn">🔄 Refresh</button>
        </div>
    </div>
</header>

<main>

    <!-- ── Leaderboard ── -->
    <div id="leaderboard-view" class="view active">
        <div class="event-info-bar">
            <div>
                <div class="event-title">Tap Hero Competition Leaderboard</div>
                <div class="event-dates">Top 100 players, refreshed every ~10 minutes — individual competition</div>
            </div>
        </div>

        <h3 class="sub-heading" id="leaderboard-heading">Top 100</h3>
        <div class="players-table-container">
            <table class="players-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Points</th>
                        <th>Δ10m</th>
                        <th>Δ30m</th>
                        <th>Δ1Hr</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- ── Player Detail ── -->
    <div id="player-detail-view" class="view">
        <div class="detail-top-bar">
            <button class="back-btn" id="back-btn">← Back to Leaderboard</button>
        </div>
        <div class="team-detail-header" id="player-detail-header">
            <div class="team-detail-title-row">
                <div class="team-detail-color-bar" id="player-detail-color-bar"></div>
                <div>
                    <h2 id="player-detail-name"></h2>
                    <div id="player-detail-sub" class="team-detail-sub-line"></div>
                </div>
            </div>
            <div class="team-detail-stats">
                <div class="stat-box"><span class="stat-label">Rank</span><span class="stat-value" id="pd-rank"></span></div>
                <div class="stat-box"><span class="stat-label">Points</span><span class="stat-value" id="pd-pts"></span></div>
            </div>
            <div class="team-detail-stats" style="margin-top:16px">
                <div class="stat-box"><span class="stat-label">Last 10m</span><span class="stat-value" id="pd-delta-10m">—</span></div>
                <div class="stat-box"><span class="stat-label">Last 30m</span><span class="stat-value" id="pd-delta-30m">—</span></div>
                <div class="stat-box"><span class="stat-label">Last 1Hr</span><span class="stat-value" id="pd-delta-1h">—</span></div>
            </div>
        </div>

        <h3 class="sub-heading">Point History (last ~90 min)</h3>
        <div class="players-table-container">
            <table class="players-table">
                <thead>
                    <tr><th>Time</th><th>Points</th><th>Δ</th></tr>
                </thead>
                <tbody id="history-tbody"></tbody>
            </table>
        </div>
    </div>

</main>

<div id="toast" class="toast"></div>

<script src="app.js?v=1"></script>
</body>
</html>
