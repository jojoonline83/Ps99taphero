name: Snapshot Tap Hero Leaderboard

on:
  workflow_dispatch:
    inputs:
      test_discord_alert:
        description: 'Send a one-off test Discord alert and exit (skips the actual snapshot)'
        type: boolean
        default: false
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if an older run is still in progress
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cutoff=$(date -u -d '15 minutes ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-15M '+%Y-%m-%dT%H:%M:%SZ')
          other_runs=$(gh run list --repo "${{ github.repository }}" --workflow snapshot.yml --status in_progress --json databaseId,createdAt --jq '.[]' | grep -v "\"databaseId\":${{ github.run_id }}" || true)
          proceed=true
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            id=$(echo "$line" | grep -o '"databaseId":[0-9]*' | grep -o '[0-9]*')
            created=$(echo "$line" | grep -o '"createdAt":"[^"]*"' | cut -d'"' -f4)
            [ -z "$id" ] && continue
            if [ "$id" -lt "${{ github.run_id }}" ]; then
              if [[ "$created" > "$cutoff" ]]; then
                proceed=false
                echo "Older run $id (started $created) is still active — skipping."
              else
                echo "Ignoring stale run $id (started $created, older than 15m)."
              fi
            fi
          done <<< "$other_runs"
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

      - name: Record and push snapshot (retries on conflict)
        if: steps.guard.outputs.proceed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_DISCORD_ALERT: ${{ github.event.inputs.test_discord_alert }}
          PS99_TOKEN_AVOCARDORABLE99: ${{ secrets.PS99_TOKEN_AVOCARDORABLE99 }}
          PS99_TOKEN_JJLOVEGAME99: ${{ secrets.PS99_TOKEN_JJLOVEGAME99 }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            node .github/scripts/snapshot.mjs || exit 0
            git add -f history.json league_history.json transcend_history.json collection.json resolved_names.json .github/monitor-data
            git diff --cached --quiet && exit 0
            git commit -m "chore: snapshot tap hero leaderboard"
            git push && exit 0
            echo "Push rejected — retrying from latest main"
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
          done
          echo "::error::Failed to push snapshot after 5 attempts"
          exit 1

      - name: Setup Pages
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        if: steps.guard.outputs.proceed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.guard.outputs.proceed == 'true' && steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (retry 1)
        if: steps.guard.outputs.proceed == 'true' && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
