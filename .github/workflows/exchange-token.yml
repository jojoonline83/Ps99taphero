name: Exchange OAuth Token

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Authorization code from the OAuth callback page'
        required: true
      code_verifier:
        description: 'Code verifier used during authorization'
        required: true
      client_id:
        description: 'Client ID (from developer app page)'
        required: true
      client_secret:
        description: 'Client Secret (from developer app page)'
        required: true
      account_label:
        description: 'Which account is this token for?'
        required: true
        type: choice
        options:
          - avocardorable99
          - jjlovegame99

permissions:
  contents: write

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exchange authorization code for access token
        env:
          AUTH_CODE: ${{ inputs.auth_code }}
          CODE_VERIFIER: ${{ inputs.code_verifier }}
          CLIENT_ID: ${{ inputs.client_id }}
          CLIENT_SECRET: ${{ inputs.client_secret }}
          REDIRECT_URI: https://jojoonline83.github.io/Ps99taphero/oauth-callback.html
        run: |
          echo "Client ID: ${CLIENT_ID}"
          echo "Auth Code: ${AUTH_CODE}"
          echo "Redirect URI: ${REDIRECT_URI}"
          echo "Verifier length: ${#CODE_VERIFIER}"

          BASIC_AUTH=$(echo -n "${CLIENT_ID}:${CLIENT_SECRET}" | base64 -w0)

          RESPONSE=$(curl -sS -X POST "https://db.biggames.io/oauth/token" \
            -H "Authorization: Basic ${BASIC_AUTH}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=authorization_code&code=${AUTH_CODE}&redirect_uri=${REDIRECT_URI}&code_verifier=${CODE_VERIFIER}")

          echo "Full response: $RESPONSE"

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Token exchange failed."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "::notice::Token obtained successfully for ${{ inputs.account_label }}"
          echo "Secret name: PS99_TOKEN_$(echo "${{ inputs.account_label }}" | tr 'a-z' 'A-Z' | tr -c 'A-Z0-9' '_')"

          mkdir -p token-output
          echo "$TOKEN" > token-output/token.txt

      - name: Upload token as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps99-token-${{ inputs.account_label }}
          path: token-output/token.txt
          retention-days: 1
